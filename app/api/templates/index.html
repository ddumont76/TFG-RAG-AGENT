<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Agente RAG – TFG Deborah</title>

    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>

<h1>🧠 Agente RAG – TFG</h1>

<div class="container">
    <label>Introduce tu consulta:</label>
    <textarea id="query" placeholder="Ejemplo: Error 403 en pipeline Jenkins..."></textarea>

    <label>Documentos a recuperar (top_k):</label>
    <input type="number" id="top_k" value="5" min="1" max="10" />

    <button onclick="sendQuery()">Enviar consulta</button>

    <div id="response-container">
        <h2>Respuesta del agente:</h2>
        <pre id="answer"></pre>

        <h3>Tickets usados:</h3>
        <pre id="tickets"></pre>

        <h3>Docs usados:</h3>
        <pre id="docs"></pre>

        <h3>Metadata:</h3>
        <pre id="meta"></pre>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
